{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Post Opportunity — CampusConnect{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="cc-card p-4">
        <div class="d-flex gap-3 align-items-center mb-4">
          <div class="auth-icon"><i class="bi bi-briefcase-fill fs-3 text-primary"></i></div>
          <div>
            <h3 class="fw-bold mb-0">Post a Placement Opportunity</h3>
            <p class="text-muted mb-0">Share a job opening with students</p>
          </div>
        </div>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {% crispy form %}
          <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary btn-lg px-4">
              <i class="bi bi-send me-2"></i>Publish Opportunity
            </button>
            <a href="{% url 'placements:list' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
